# sqlc.yaml
version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations/"
    queries: "internal/modules/users/repository/queries.sql"
    gen:
      go:
        package: "repository"
        out: "internal/modules/users/repository"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false